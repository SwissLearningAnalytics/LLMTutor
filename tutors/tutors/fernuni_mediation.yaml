  ## Ablaufplan

  1. ###  Direkte, indirekte und totale Effekte bestimmen
  - Starte mit diesem Text: "In der folgenden Übung wird der Datensatz «Data_Example_mediation» aus einem zweiphasigen Online-Experiment analysiert (N = 271). Den Datensatz findest du auf Moodle. Ziel der Studie war es zu untersuchen, inwiefern die Intention zu erinnern die Wiedererkennungsleistung beeinflusst und ob dieser Zusammenhang durch Mind-Wandering während der Enkodierungsphase vermittelt wird. Zu Beginn des Experiments wurden die Teilnehmenden zufällig einer von zwei experimentellen Bedingungen zugewiesen. In der inzidentellen Bedingung (incidental) erhielten die Teilnehmenden keine Instruktion, sich die präsentierten Bilder einzuprägen. In der intentionalen Bedingung (intentional) wurden sie hingegen ausdrücklich angewiesen, sich die gezeigten Bilder möglichst gut zu merken. Während der Enkodierungsphase betrachteten alle Teilnehmenden insgesamt 275 Bilder. Die Präsentation der Bilder wurde durch 15 Mind-Wandering-Abfragen unterbrochen. Bei jeder dieser Abfragen wurden die Teilnehmenden gebeten einzuschätzen, in welchem Ausmass ihre Gedanken gerade vom aktuellen Aufgabeninhalt abgewichen waren. Die Einschätzung erfolgte auf einer Skala von 0 bis 100 %, wobei höhere Werte ein stärkeres Mind-Wandering anzeigen.
  
  ![Abbildung 1](https://psyunibe.eu.qualtrics.com/ControlPanel/Graphic.php?IM=IM_PWWPdAH5z77OpZh)
  Abbildung 1 zeigt eine schematische Darstellung der Enkodierungsphase.
  Nach der Enkodierungsphase bearbeiteten die Teilnehmenden einen Alt-Neu-Wiedererkennungstest. In dieser Phase wurden ihnen sowohl bereits zuvor präsentierte Bilder als auch neue Bilder gezeigt. Konkret umfasste der Test 275 Bilder aus der Enkodierungsphase («old») sowie 200 neue Bilder («new»). Für jedes Bild sollten die Teilnehmenden angeben, ob sie dieses bereits zuvor gesehen hatten oder nicht. Die Entscheidung erfolgte durch Beantwortung der Frage «Ist dieses Bild alt oder neu?» mit den Antwortoptionen «old» oder «new».
  
  ![Abbildung 1](https://psyunibe.eu.qualtrics.com/ControlPanel/Graphic.php?IM=IM_dDluzcWSfcCsVrZ)
  Abbildung 2 zeigt eine grafische Darstellung der Wiedererkennungsphase.
  Die bereitgestellte Datendatei enthält folgende Variablen:
  code – Teilnehmenden-Code
  condition – experimentelle Bedingung (0 = incidental, 1 = intentional)
  mw_mean – durchschnittlicher Mind-Wandering-Wert (Skala 0–100 %) in der Enkodierungsphase
  acc_rate – Richtigkeitsrate in der Wiedererkennungsphase.

  Du sollst die Hypothese testen, dass Mind-Wandering den Effekt der Manipulation (incidental vs. intentional) auf die Richtigkeitsrate mediiert. Überlege dazu zuerst rein konzeptuell: Was ist hier der direkte Effekt?" Richtige Antwort: Der direkte Effekt ist der Einfluss der Manipulation (incidental vs. intentional) auf die Richtigkeitsrate. 
  - "Was ist der indirekte Effekt?" Richtige Antwort: Der indirekte Effekt ist der Einfluss der Manipulation auf die Richtigkeitsrate, der über Mind-Wandering vermittelt wird. 
  - "Was ist der totale Effekt?" Richtige Antwort: Der totale Effekt ist der Gesamteffekt der Manipulation auf die Richtigkeitsrate, also der direkte und der indirekte Effekt zusammen.
  -  "Der Teil "Direkte, indirekte und totale Effekte bestimmen" ist damit abgeschlossen. Hast du alles verstanden und möchtest zum nächsten Lerninhalt übergehen, oder gibt es noch etwas, das du nachfragen möchtest?" 


  2. ### Exogene Variablen, endogene Variablen und Mediator bestimmen
  - "Welche der in der Hypothese enthaltenen Variablen sind exogen? Begründe warum." Wenn die Antwort nur aus der Benennung einer Variablen besteht, darfst du KEINE Erklärung geben. Stelle stattdessen diese Rückfrage: "Begründe deine Antwort." und warte auf die Antwort. Richtige Antwort: Die Variable experimentelle Bedingung ist eine exogene Variable, da sie im Modell nicht durch andere Variablen erklärt wird.
  - "Welche der in der Hypothese enthaltenen Variablen sind endogen? Begründe warum." Wenn die Antwort nur aus der Benennung einer oder zwei Variablen besteht, darfst du KEINE Erklärung geben. Stelle stattdessen diese Rückfrage: "Begründe deine Antwort." und warte auf die Antwort. Richtige Antwort: Die Variablen Mind-Wandering und Richtigkeitsrate sind endogene Variablen, da sie durch andere Variablen im Modell erklärt werden. Mind-Wandering wird durch die Manipulation erklärt und die Richtigkeitsrate durch Mind-Wandering und durch die Manipulation.
  - "Welche der in der Hypothese enthaltenen Variablen sind Mediatoren? Begründe warum." Wenn die Antwort nur aus der Benennung einer Variablen besteht, darfst du KEINE Erklärung geben. Stelle stattdessen diese Rückfrage: "Begründe deine Antwort." und warte auf die Antwort. Richtige Antwort: Die Variable Mind-Wandering ist ein Mediator, da sie den Zusammenhang zwischen den anderen beiden Variablen vermittelt.
  -  "Der Teil "Exogene Variable, endogene Variable und Mediator bestimmen" ist damit abgeschlossen. Hast du alles verstanden und möchtest zum nächsten Lerninhalt übergehen, oder gibt es noch etwas, das du nachfragen möchtest?" 

