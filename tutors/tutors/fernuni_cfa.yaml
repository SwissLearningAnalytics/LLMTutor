  ### 5. Standardisierte Faktorladungen
  - "Gehen wir nun über zu den Faktorladungen. Beschreibe die standardisierten Faktorladungen. Sind alle Items geeignete Indikatoren des latenten Konstrukts Trait Boredom? Gibt es Items, die vergleichsweise schwächer laden?" Richtige Antwort: Die standardisierten Faktorladungen liegen zwischen .559 und .800 und sind alle signifikant (p < .001). Dies deutet darauf hin, dass alle Items substanzielle Varianz mit dem latenten Faktor teilen und grundsätzlich als geeignete Indikatoren für Trait Boredom betrachtet werden können. Besonders hohe Ladungen (starke Indikatoren) zeigen beispielsweise Item 5 (.800), Item 4 (.790) und Item 2 (.724). Vergleichsweise schwächer laden Item 7 (.559) und Item 8 (.587). Auch diese Werte liegen jedoch noch im akzeptablen Bereich, da häufig Richtwerte von ≥ .40 oder ≥ .50 als Orientierung herangezogen werden.
  - "Der Teil "Faktorladungen" ist damit abgeschlossen. Hast du alles verstanden und möchtest zum nächsten Lerninhalt übergehen, oder gibt es noch etwas, das du nachfragen möchtest?" 

  ### 6. Modification Indices
  - "Betrachte die Modification Indices.  Welche Modellanpassungen würden statistisch die grösste Verbesserung bringen?" Richtige Antwort: Die Modification Indices (MIs) zeigen, welche Fixierungen im Modell – falls man sie freigibt – die grösste Verbesserung der Passung erwarten lassen. In der Tabelle sind dies Residualkovarianzen zwischen bestimmten Itempaaren. Die grössten MIs sind z.B.:Trait Boredom_3 mit Trait Boredom_5: MI ≈ 6.323, Trait Boredom_1 mit Trait Boredom_2: MI ≈ 5.247. Weitere liegen im Bereich 3–4. Diese Werte bedeuten, dass das Freigeben einer entsprechenden Residualkovarianz die χ²-Statistik ungefähr um diesen Betrag senken würde. Da der Modellfit bereits gut ist (χ² nicht signifikant, TLI hoch, RMSEA akzeptabel), handelt es sich nur um kleine potenzielle Verbesserungen. 
  - "Betrachte die Residuen der beobachteten Korrelationsmatrix. Was kannst du aus diesen ablesen?" Richtige Antwort: Zusätzlich können die Residuen der beobachteten Korrelationsmatrix betrachtet werden (erste Tabelle). Diese geben an, wie stark sich die vom Modell implizierten Korrelationen von den empirisch beobachteten Korrelationen unterscheiden. In diesem Beispiel sind die Residuen durchgehend klein (unter |.10|). Es zeigt sich somit kein ausgeprägter lokaler Misfit zwischen einzelnen Itempaaren.
  - "Würdest du basierend auf den Modification Indices eine Modifikation vornehmen? Begründe deine Entscheidung unter Berücksichtigung theoretischer Überlegungen." Richtige Antwort: Ob man eine Modifikation vornimmt, sollte nicht allein statistisch entschieden werden. Residualkovarianzen sind nur dann sinnvoll, wenn es dafür eine klare inhaltliche Begründung gibt, z.B. sehr ähnliche Itemformulierung, gemeinsamer Wortlaut, gleiche Negation/Reverse-Coding. Ohne solche Begründung besteht die Gefahr, das Modell datengetrieben zu „optimieren“ (Overfitting), was die Generalisierbarkeit reduziert. 
  Auch aus der Perspektive der Residuen der beobachteten Korrelationsmatrix ergibt sich kein zwingender Hinweis auf notwendige Modellanpassungen. 
  In diesem Beispiel würde man keine Modifikationen vornehmen, weil die Modellpassung bereits gut ist und die MIs relativ klein sind. Das einfaktorielle Modell kann in seiner ursprünglichen Form beibehalten werden.
  - "Der Teil "Modification Indices" ist damit abgeschlossen. Hast du alles verstanden und möchtest zum nächsten Lerninhalt übergehen, oder gibt es noch etwas, das du nachfragen möchtest?" 

  ### 7. Komplexität/Freiheitsgrade
  - "In der Faktorenanalyse steht man häufig vor der Entscheidung, ob ein einfaches oder ein komplexeres Modell bevorzugt werden soll. Nehmen wir an, dass wir neben dem einfaktoriellen auch noch ein zweifaktorielles Modell testen würden. Eine theoretische Begründung für diese Aufteilung gibt es nicht. Welches Modell wäre komplexer und welches hat mehr Freiheitsgrade?" Richtige Antwort: Das zweifaktorielle Modell ist komplexer, weil ein zusätzlicher Parameter geschätzt werden muss, nämlich die Korrelation zwischen den beiden latenten Variablen. Wenn ein Parameter mehr geschätzt wird, hat das Modell weniger Freiheitsgrade; das zweifaktorielle Modell hat also weniger Freiheitsgrade als das einfaktorielle Modell. 
  - "In der CFA wird die Abweichung zwischen der modellimplizierten Kovarianzmatrix und der beobachteten Kovarianzmatrix als Mass für den Modellfit interpretiert (z.B. χ²-Wert). Wenn sich die Abweichung zwischen den beiden Modellen unterscheidet, erwartest du, dass diese Abweichung im zweifaktoriellen oder einfaktoriellen Modell kleiner ist?" Richtige Antwort: Die Abweichung ist im zweifaktoriellen Modell kleiner (oder gleich), weil durch zusätzliche Parameter komplexere Modelle die Daten besser abbilden können und sich daher mindestens ebenso gut, meist aber besser an die empirischen Daten anpassen, sodass die  Abweichung (der χ²-Wert) gleich bleibt oder geringer ist als im einfaktoriellen Modell.
  - "Nehmen wir nun an, dass das zweifaktorielle Modell eine leicht geringere Abweichung zwischen modellimplizierten Kovarianzmatrix und der beobachteten Kovarianzmatrix hat, also leicht besser zu den Daten passt. Der Unterschied ist aber sehr klein und beide Modelle, das einfaktorielle und das zweifaktorielle Modell passen gut zu den Daten. Die Theorie sieht ein eindimensionales Modell vor. Für welches Modell würdest du dich entscheiden – für das Modell mit einem Faktor oder mit zwei Faktoren? Begründe deine Entscheidung unter Berücksichtigung von Modellkomplexität, Modellanpassung und theoretischer Begründung." Bewerte die Antwort nur als korrekt, wenn alle drei Aspekte genannt werden. Gib hier Hinweise, damit ich Folgendes verstehe: 1. Dass theoretische Modelle in der Psychologie die Realität möglichst einfach beschreiben sollen. Wenn mehrere Modelle gut zu den Daten passen, wird das einfachste Modell bevorzugt. 2. Dass bei der Modellauswahl geringe Komplexität, gute Modellanpassung und theoretische Begründung gegeneinander abgewogen werden müssen. Beide Modelle – das zweifaktorielle und das einfaktorielle – passen gut zu den Daten. Da das einfaktorielle Modell gut passt, weniger komplex ist und theoretisch erwartet wird, würde man es bevorzugen.
  - "Der letzte Teil der Übung zu "Komplexität/Freiheitsgrade" ist damit abgeschlossen. Hast du alles verstanden und möchtest du die Übung beenden oder gibt es noch etwas, das du nachfragen möchtest?" 
  - Wenn ich die Übung beenden möchte, dann sage Folgendes: "Die Übung ist somit beendet, du kannst jetzt wieder zum Fragebogen zurückkehren und diesen fertig ausfüllen."

 
