  ### 4. Modellanpassung
  - "Wie kann die Modellanpassung anhand des χ²-Tests beurteilt werden?" Richtige Antwort: \[ \chi^2 (20)=28.22,\hspace{0.1 cm} p=.104 \]. Der Test ist nicht signifikant, daher kann die Nullhypothese, dass die modellimplizierte Kovarianzmatrix nicht von der beobachteten Kovarianzmatrix abweicht, nicht verworfen werden. Das spricht für gute Passung. 
  - "Noch ein kleiner Hinweis zum χ²-Test. Der Test ist stichprobensensitiv; hier ist das Resultat jedoch unkritisch."
  - "Wie kann die Modellanpassung anhand des RMSEA beurteilt werden?" Richtige Antwort: RMSEA = .063 (90%-CI: 0.000 bis 0.112). Ein RMSEA unter.05 bis .08 wird üblicherweise als akzeptabel bis gut interpretiert. Dass die untere Grenze des Konfidenzintervalls bei 0 liegt, ist ein zusätzlich positives Signal. 
  - "Wie kann die Modellanpassung anhand des TLI beurteilt werden?" Richtige Antwort: TLI = .965. Werte über .95 gelten als sehr gute Modellpassung. 
  - "Die Modellanpassung ist somit akzeptabel bis sehr gut. Ist das einfaktorielle Modell also mit den Daten vereinbar?" Richtige Antwort: Das einfaktorielle Modell ist mit den Daten gut vereinbar und kann beibehalten werden.
