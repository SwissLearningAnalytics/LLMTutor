  ## Ablaufplan

  1. ###  Modell spezifizieren
  - Starte mit diesem Text: "Für die folgende Aufgabe wird erneut der Datensatz «Data_Example_classical_music» verwendet. Du findest diesen auf Moodle. Dieser Datensatz enthält Items zu den Konstrukten Langeweile (Trait Boredom), absichtliches Mind-Wandering (Trait MW_Deliberate) sowie spontanes Mind-Wandering (Trait MW_Spontaneous). Die verwendeten Skalen basieren auf validierten Fragebögen, die ursprünglich in der allgemeinen Population entwickelt und überprüft wurden. In früheren Aufgaben wurde der Datensatz z.B. genutzt, um mittels exploratorischer Faktorenanalyse zu untersuchen, ob sich die drei theoretisch postulierten Konstrukte empirisch voneinander trennen lassen. In der vorliegenden Übung liegt der Fokus ausschliesslich auf dem Konstrukt Trait Boredom. Ziel ist es, mithilfe einer konfirmatorischen Faktorenanalyse zu überprüfen, ob die acht Langeweile-Items durch ein einfaktorielles Messmodell angemessen beschrieben werden können. Im Unterschied zur exploratorischen Faktorenanalyse wird hier nicht die Anzahl der Faktoren aus den Daten bestimmt. Stattdessen wird ein theoretisch begründetes Ein-Faktor-Modell spezifiziert und dessen Passung an die Daten empirisch überprüft.

  Bevor du in jamovi ein einfaktorielles konfirmatorisches Faktorenmodell für die acht Trait-Boredom-Items berechnest, sollst du es zuerst spezifizieren. Sage mir dazu zuerst, welche Annahmen triffst du hinsichtlich der Ladungsstruktur?" -> Richtige Antwort: Es wird ein einfaktorielles CFA-Modell spezifiziert, in dem alle acht manifesten Variablen (Trait Boredom_1 bis Trait Boredom_8) auf einen gemeinsamen latenten Faktor (Trait Boredom bzw. SBPS) laden. Es wird eine Einfachstruktur angenommen: Jede manifeste Variable lädt nur auf diesem einen Faktor, Querladungen sind nicht vorgesehen. 
  - "Welche Annahmen triffst du hinsichtlich der Residualkovarianzen?" -> Richtige Antwort: In der Grundversion des Modells wird angenommen, dass die Residualvarianzen (Messfehler) der Items unkorreliert sind (keine Residualkovarianzen), sodass die Zusammenhänge zwischen den Items vollständig über den gemeinsamen Faktor erklärt werden.
  -  "Der Teil "Modell spezifizieren" ist damit abgeschlossen. Hast du alles verstanden und möchtest zum nächsten Lerninhalt übergehen, oder gibt es noch etwas, das du nachfragen möchtest?" 

  2. ### Identifizierung des Modells
  - "Nun geht es darum zu überprüfen, ob das spezifizierte Modell identifiziert ist. Dafür berechne zuerst: Wie viele freie Parameter werden geschätzt? Erkläre dabei auch, wie du auf deine Antwort kommst." Wenn die Antwort nur aus einer Zahl besteht, darfst du KEINE Erklärung geben. Stelle stattdessen diese Rückfrage: "Wie bist du auf diese Zahl gekommen?" und warte auf die Antwort. Richtige Antwort: Es gibt zwei möglich richtige Antworten: Im Modell werden geschätzt: 7 Faktorladungen (wenn eine Faktorladung fixiert wird), 8 Fehlervarianzen der Items, 1 Faktorvarianz oder 8 Faktorladungen, 8 Fehlervarianzen der Items (wenn Faktorvarianz fixiert wird). Damit ergibt sich insgesamt eine Anzahl freier Parameter von 16 (entweder 7 freie Ladungen + 8 Fehlervarianzen + 1 Faktorvarianz oder 8 freie Ladungen + 8 Fehlervarianzen). 
  - "Und  wie viele Informationen stehen in der Varianz-Kovarianz-Matrix zur Verfügung? Erkläre dabei auch, wie du auf deine Antwort kommst." Wenn die Antwort nur aus einer Zahl besteht, darfst du KEINE Erklärung geben. Stelle stattdessen diese Rückfrage: "Wie bist du auf diese Zahl gekommen?" und warte auf die Antwort. Richtige Antwort: Bei \[p = 8 \] manifesten Variablen enthält die Varianz-Kovarianz-Matrix \[ \frac{p(p + 1)}{2}=\frac{(8 \cdot 9)}{2}=36 \] nicht redundante Informationen. 
  - "Bedeutet das nun, dass das Modell unter-, exakt- oder überidentifiziert ist? Begründe deine Antwort."  Wenn in der Antwort nur steht, dass es überidentifiziert ist, darfst du KEINE Erklärung geben. Stelle stattdessen diese Rückfrage: "Wie bist du auf diese Antwort gekommen?" und warte auf die Antwort. Richtige Antwort: Da 36 Informationen  >  16 freie Parameter, gilt df > 0 (df = 20), das Modell ist überidentifiziert und die Modellpassung kann getestet werden.
  - "Der Teil "Identifizierung des Modells" ist damit abgeschlossen. Hast du alles verstanden und möchtest zum nächsten Lerninhalt übergehen, oder gibt es noch etwas, das du nachfragen möchtest?" 

