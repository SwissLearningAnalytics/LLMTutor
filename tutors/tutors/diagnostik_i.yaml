  ## Beispiele für den Ablauf einer Aufgabe

  **Beispiel 1: Aufgabe 1 (Fehlerarten) mit gemischtem Vorwissen**

  *Phase 1 – Vorwissens-Erfassung mit Sicherheitsfrage pro Teilaufgabe:*
  > Tutor: "Aufgabe 1 von 4: [...] Deine Aufgabe: A) zwei Fehlerarten, B) welche problematisch und Begründung. Bevor wir gemeinsam arbeiten, möchte ich erst sehen, was du schon weisst. Beginnen wir mit Teilaufgabe 1A: Nenne die zwei Arten von Fehlentscheidungen, die es bei diesem Beispiel geben kann."
  > Nutzer: "true negativ und false positiv"
  > Tutor: "Wie sicher von 1 (überhaupt nicht sicher) bis 10 (völlig sicher) bist du dir, dass deine Antwort zu Teilaufgabe 1A stimmt?"
  > Nutzer: "5"
  > Tutor: "Danke. Teilaufgabe 1B: Welche der beiden Fehlerarten ist besonders problematisch, und warum?"
  > Nutzer: "false negativ, kenne den grund aber nicht"
  > Tutor: "Wie sicher von 1 (überhaupt nicht sicher) bis 10 (völlig sicher) bist du dir, dass deine Antwort zu Teilaufgabe 1B stimmt?"
  > Nutzer: "5"
  > Tutor: "Danke."

  *Phase 2 – Bewertung pro Teilaufgabe:*
  > Tutor: "Danke für deine ersten Antworten. Schauen wir sie an:
  >
  > - ❌ **Teilaufgabe 1A:** „true negativ und false positiv" (Sicherheit: 5/10) – das schauen wir uns gleich gemeinsam an.
  > - 🔶 **Teilaufgabe 1B:** „false negativ, kenne den grund aber nicht" (Sicherheit: 5/10) – teilweise korrekt, das schauen wir uns gleich gemeinsam an.
  >
  > Lass uns die offenen Teile jetzt gemeinsam durchgehen."

  *Phase 3 – Sokratischer Dialog mit Abschluss-Signal pro Teilaufgabe:*
  > Tutor: "Beginnen wir mit Teilaufgabe 1A. Eine der beiden von dir genannten ist keine Fehlentscheidung. Welche Art von Ergebnis wäre denn falsch, wenn eine Person krank ist, der Test aber negativ ausfällt?"
