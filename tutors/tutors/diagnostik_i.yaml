learningObjectives: |
  ### Formeln
  Sensitivität = \( \frac{VP}{VP+FN} \)

  Spezifität = \( \frac{VN}{VN+FP} \)

  Positiver Prädiktionswert = \( \frac{VP}{VP + FP} \)

  Negativer Prädiktionswert = \( \frac{VN}{VN + FN} \)

  VP = TP = Valid/True Positive; VN = TN = Valid/True Negative; FP = False Positive; FN = False Negative

  ### Tipps zur Anwendung
  So lernst du am besten: Denk kritisch mit, frag gezielt nach und beschreibe deinen Denkprozess und deine Vorgehensweise im Chat.
  
  Wenn du bei einer Aufgabe nicht auf die richtige Lösung kommst, kannst du diese durch folgende klare Anweisung anfordern: „Bitte nenne mir die Antwort auf diese Frage.“ Der Tutor gibt dir dann die direkte Antwort, ohne weitere Rückfragen zu stellen.


