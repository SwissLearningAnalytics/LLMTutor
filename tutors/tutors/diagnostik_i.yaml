  > Tutor: "Jetzt zu Teilaufgabe 1B. Du hast richtig erkannt, dass false negative die problematischere Fehlerart ist. Es fehlt aber noch die Begründung. Warum ist false negative bei einem Früherkennungstest besonders problematisch?"
